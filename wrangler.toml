name = "daily-check-api"
main = "worker/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "daily-check-db"
database_id = "2e9170b0-e0e1-43fc-b1ec-a7d23cb6964d"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "daily-check-attachments"

[triggers]
crons = ["*/5 * * * *"]

[ai]
binding = "AI"

# Rate limiter for the public /agent/* surface. 60 req/min per key (see
# agentRateLimitMiddleware for key derivation: PAT id, share token id, or IP).
[[unsafe.bindings]]
name = "AGENT_RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Secrets required at runtime (set via `wrangler secret put <NAME>`, never commit values):
#   JWT_SECRET
#   API_KEY
#   DEEPSEEK_API_KEY
#   TOKEN_ENCRYPTION_KEY  # 64 hex chars (32 bytes) for AES-256-GCM PAT encryption.
#                         # Set with: wrangler secret put TOKEN_ENCRYPTION_KEY
#                         # For local dev, use .dev.vars.
